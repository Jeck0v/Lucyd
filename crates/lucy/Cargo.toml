[package]
name        = "lucyd"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Auto-generated interactive docs UI for Axum backends: HTTP, WebSocket, and MQTT in one interface  /docs"
keywords    = ["axum", "documentation", "openapi", "websocket", "mqtt"]
categories  = ["web-programming::http-server", "development-tools"]
readme      = "../../README.md"
repository.workspace = true

[dependencies]
lucy-core  = { workspace = true }
lucy-macro = { workspace = true }
lucy-types = { workspace = true }
inventory  = { workspace = true }
schemars   = { workspace = true }
serde_json = { workspace = true }

[dev-dependencies]
lucy-core = { workspace = true }
axum      = { workspace = true, features = ["ws"] }
tokio     = { workspace = true }
serde     = { workspace = true }
