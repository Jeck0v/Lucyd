openapi: "3.1.0"
info:
  title: Sample API
  version: "1.0.0"
paths:
  /health:
    get:
      operationId: health_check
      description: Health check endpoint
      tags: [system]
      responses:
        "200":
          content:
            application/json:
              schema:
                type: string
  /api/users:
    post:
      operationId: create_user
      description: Create a new user
      tags: [users]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                email:
                  type: string
              required: [name, email]
      responses:
        "201":
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  name:
                    type: string
                required: [id, name]
